<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar campanha — Radar Relevantia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Poppins:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #B8860B; --gold-light: #C8A84B; --gold-gradient: linear-gradient(135deg,#B8860B,#C8A84B);
  --gold-muted: rgba(184,134,11,0.08); --gold-border: rgba(184,134,11,0.22);
  --brown-warm: #7A5C1E;
  --black: #1A1200; --white: #FFFFFF; --white-warm: #FFFDF7;
  --gray-1: #F5F0E8; --gray-2: #E0D8CC; --gray-3: #A89880; --gray-4: #5C4C38;
  --text: #1A1200;
  --radius-pill: 100px; --radius-base: 10px;
  --gray-body: #FAF8F5;
  --font-heading: 'Playfair Display', serif;
  --font-heading-ui: 'Poppins', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --shadow-sm: 0 1px 3px rgba(30,22,0,0.12);
  --radius-lg: 16px; --radius-md: 12px;
}
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background: var(--gray-body); color: var(--text); min-height: 100vh; }

/* ── Topbar ── */
.topbar {
  position: fixed; left: 0; top: 0; right: 0; height: 64px; z-index: 90;
  background: rgba(250,248,245,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--gray-2);
  display: flex; align-items: center; padding: 0 32px; gap: 12px;
}
.topbar-logo { display: flex; align-items: center; text-decoration: none; }
.topbar-logo img { height: 34px; width: auto; display: block; filter: brightness(0); }
.topbar-sep { color: var(--gray-2); user-select: none; }
.topbar-title { font-family: var(--font-heading-ui); font-size: 15px; font-weight: 600; color: var(--text); }
.topbar-right { margin-left: auto; }
.btn-pular { font-size: 12px; color: var(--gray-3); background: none; border: none; cursor: pointer; font-family: var(--font-body); padding: 0; text-decoration: none; }
.btn-pular:hover { color: var(--black); }

/* ── Main ── */
.main { padding-top: 64px; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; }
.cam-page { width: 100%; max-width: 600px; margin: 0 auto; padding: 32px 20px 60px; }

/* ── Loading ── */
#loading-section { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding-top: 140px; }
.ld-spinner { width: 26px; height: 26px; border: 2.5px solid rgba(184,134,11,0.15); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.ld-text { font-size: 13px; color: var(--gray-3); }

/* ── Cam Page Header ── */
.cam-page-header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
.cam-page-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--gold-gradient); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.cam-page-title { font-family: var(--font-heading-ui); font-size: 18px; font-weight: 700; color: var(--black); letter-spacing: -.2px; }
.cam-page-badge { font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--brown-warm); background: var(--gold-muted); border: 1px solid var(--gold-border); padding: 3px 8px; border-radius: var(--radius-pill); }

/* ── Steps indicator ── */
.cam-steps { display: flex; align-items: center; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
.cam-step-dot {
  font-size: 11px; color: var(--gray-3);
  background: var(--gray-1); border: 1px solid var(--gray-2);
  padding: 3px 10px; border-radius: var(--radius-pill);
  font-weight: 500; cursor: default;
}
.cam-step-dot.active {
  color: var(--brown-warm); background: rgba(184,134,11,0.08);
  border-color: rgba(184,134,11,0.3); font-weight: 600;
}
.cam-step-dot.done { color: var(--gray-3); text-decoration: line-through; }
.cam-step-sep { font-size: 12px; color: var(--gray-2); }

/* ── Prompt Step ── */
.cam-prompt-body { display: flex; flex-direction: column; gap: 16px; }
.cam-bus-section { margin-bottom: 4px; }
.cam-bus-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--gray-3); margin-bottom: 8px; }
.cam-bus { display: flex; flex-wrap: wrap; gap: 6px; }
.cam-bu-chip { padding: 6px 14px; border: 1.5px solid var(--gray-2); border-radius: var(--radius-pill); font-size: 13px; font-family: var(--font-body); color: var(--gray-4); background: var(--white); cursor: pointer; transition: all .15s; font-weight: 500; }
.cam-bu-chip:hover { border-color: var(--gold); color: var(--brown-warm); background: rgba(184,134,11,.04); }
.cam-bu-chip.selected { border-color: var(--gold); background: rgba(184,134,11,.10); color: var(--brown-warm); font-weight: 600; }
.cam-prompt-label { font-size: 15px; font-weight: 600; color: var(--black); }
.cam-prompt-hint { font-size: 13px; color: var(--gray-3); margin-top: 3px; line-height: 1.5; }
.cam-prompt-textarea { width: 100%; padding: 14px 16px; border: 1.5px solid var(--gray-2); border-radius: 12px; font-size: 14px; font-family: var(--font-body); color: var(--text); background: var(--gray-1); outline: none; resize: none; min-height: 100px; line-height: 1.6; transition: border .18s, background .18s; }
.cam-prompt-textarea:focus { border-color: var(--gold); background: var(--white); }
.cam-prompt-footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.cam-manual-link { font-size: 12px; color: var(--gray-3); background: none; border: none; cursor: pointer; font-family: var(--font-body); text-decoration: underline; padding: 0; flex-shrink: 0; }
.cam-manual-link:hover { color: var(--black); }
.cam-prompt-btn { padding: 13px 26px; background: var(--black); color: var(--white); border: none; border-radius: var(--radius-pill); font-size: 14px; font-weight: 600; font-family: var(--font-body); cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px; }
.cam-prompt-btn:hover:not(:disabled) { background: #2C1E00; }
.cam-prompt-btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── Chat Step ── */
.cam-chat-body { display: flex; flex-direction: column; gap: 0; background: var(--white); border: 1.5px solid var(--gray-2); border-radius: 16px; overflow: hidden; }
.cam-thread { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 10px; min-height: 280px; max-height: 460px; }
.cam-thread::-webkit-scrollbar { width: 4px; }
.cam-thread::-webkit-scrollbar-thumb { background: var(--gray-2); border-radius: 2px; }
.cam-msg { display: flex; gap: 8px; align-items: flex-start; }
.cam-msg.user { flex-direction: row-reverse; }
.cam-msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.cam-msg.agent .cam-msg-avatar { background: var(--gold-gradient); color: #fff; }
.cam-msg.user .cam-msg-avatar { background: var(--gray-2); color: var(--gray-4); }
.cam-msg-bubble { max-width: 76%; padding: 9px 13px; border-radius: 12px; font-size: 13px; line-height: 1.55; }
.cam-msg.agent .cam-msg-bubble { background: var(--gray-1); border: 1px solid var(--gray-2); border-radius: 12px 12px 12px 3px; }
.cam-msg.user .cam-msg-bubble { background: var(--black); color: #fff; border-radius: 12px 12px 3px 12px; }
.cam-typing-dots { display: flex; gap: 4px; padding: 4px 2px; }
.cam-typing-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); animation: camDot 1.4s ease infinite; }
.cam-typing-dots span:nth-child(2) { animation-delay: .2s; }
.cam-typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes camDot { 0%,80%,100% { opacity: .25; transform: scale(.9); } 40% { opacity: 1; transform: scale(1.1); } }
.cam-options { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
.cam-option-btn { padding: 8px 12px; background: var(--white); border: 1.5px solid var(--gray-2); border-radius: 8px; font-size: 12px; font-family: var(--font-body); color: var(--text); cursor: pointer; text-align: left; transition: all .15s; display: flex; align-items: center; gap: 8px; }
.cam-option-btn:hover { border-color: var(--gold); background: rgba(184,134,11,.05); }
.cam-option-btn[data-selected="true"] { border-color: var(--gold); background: rgba(184,134,11,.08); color: var(--brown-warm); }
.cam-option-num { width: 20px; height: 20px; border-radius: 50%; background: var(--gold-gradient); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.cam-error { font-size: 12px; color: #DC2626; padding: 6px 18px; display: none; background: rgba(239,68,68,.06); border-top: 1px solid rgba(239,68,68,.15); }
.cam-error.visible { display: block; }
.cam-loading-phase { font-size: 12px; color: var(--gray-3); font-style: italic; }
.cam-loading-dots::after { content: ''; animation: camLoadDots 1.2s steps(4,end) infinite; }
@keyframes camLoadDots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }
.cam-input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--gray-2); align-items: flex-end; background: var(--white); }
.cam-input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--gray-2); border-radius: 12px; font-size: 13px; font-family: var(--font-body); color: var(--text); background: var(--gray-1); outline: none; resize: none; min-height: 38px; max-height: 100px; overflow-y: auto; transition: all .18s; line-height: 1.5; }
.cam-input:focus { border-color: var(--gold); background: var(--white); }
.cam-btn-send { padding: 9px 16px; background: var(--black); color: #fff; border: none; border-radius: var(--radius-pill); font-size: 13px; font-weight: 600; font-family: var(--font-body); cursor: pointer; transition: all .15s; flex-shrink: 0; }
.cam-btn-send:hover:not(:disabled) { background: #2C1E00; }
.cam-btn-send:disabled { opacity: .4; cursor: not-allowed; }
.cam-result { padding: 14px 18px 18px; border-top: 1px solid var(--gray-2); background: var(--white); }
.cam-result-card { background: rgba(184,134,11,.05); border: 1.5px solid rgba(184,134,11,.22); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; }
.cam-result-nome { font-family: var(--font-heading-ui); font-size: 15px; font-weight: 700; color: var(--black); margin-bottom: 6px; }
.cam-result-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.cam-result-chip { padding: 2px 10px; border-radius: 100px; background: rgba(184,134,11,.12); border: 1px solid rgba(184,134,11,.25); font-size: 11px; font-weight: 600; color: #6b4d00; }
.cam-result-actions { display: flex; gap: 8px; }
.cam-btn-confirmar { flex: 1; padding: 13px; background: var(--gold-gradient); color: #fff; border: none; border-radius: var(--radius-pill); font-size: 14px; font-weight: 700; font-family: var(--font-heading-ui); cursor: pointer; transition: all .15s; }
.cam-btn-confirmar:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
.cam-btn-confirmar:disabled { opacity: .5; cursor: not-allowed; }
.cam-btn-refazer { padding: 13px 18px; background: none; border: 1.5px solid var(--gray-2); border-radius: var(--radius-pill); font-size: 13px; color: var(--gray-3); font-family: var(--font-body); cursor: pointer; transition: all .15s; }
.cam-btn-refazer:hover { border-color: var(--gray-3); color: var(--black); }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <a class="topbar-logo" href="index.html">
    <img src="logos/5.png" alt="Radar Relevantia" style="height:34px;width:auto;display:block;filter:brightness(0)">
  </a>
  <span class="topbar-sep">/</span>
  <span class="topbar-title">Criar campanha</span>
  <div class="topbar-right">
    <button class="btn-pular" id="linkPular" onclick="pularCampanha()">Pular por agora →</button>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Loading -->
  <div id="loading-section" style="width:100%;text-align:center">
    <div style="display:inline-flex;flex-direction:column;align-items:center;gap:12px;padding-top:120px">
      <div class="ld-spinner"></div>
      <span class="ld-text">Carregando seu perfil…</span>
    </div>
  </div>

  <!-- Cam page -->
  <div class="cam-page" id="cam-page" style="display:none">

    <div class="cam-page-header">
      <div class="cam-page-icon">✦</div>
      <div class="cam-page-title">Criar campanha</div>
      <span class="cam-page-badge">com IA</span>
    </div>

    <div class="cam-steps" id="cam-steps">
      <span class="cam-step-dot active" id="step-dot-1">Descrever objetivo</span>
      <span class="cam-step-sep">›</span>
      <span class="cam-step-dot" id="step-dot-2">Configurar filtro</span>
      <span class="cam-step-sep">›</span>
      <span class="cam-step-dot" id="step-dot-3">Confirmar</span>
    </div>

    <!-- Step 1: prompt inicial -->
    <div class="cam-prompt-body" id="cam-prompt-step">
      <div id="cam-bus-section" class="cam-bus-section" style="display:none">
        <div class="cam-bus-label">Para qual negócio?</div>
        <div class="cam-bus" id="cam-bus-chips"></div>
      </div>
      <div>
        <div class="cam-prompt-label" id="cam-prompt-label">Qual o objetivo desta campanha?</div>
        <div class="cam-prompt-hint" id="cam-prompt-hint">Descreva o que você quer alcançar — o agente vai configurar os filtros e criar o nome para você.</div>
      </div>
      <textarea class="cam-prompt-textarea" id="cam-prompt-input"
        placeholder="Ex: Quero patrocinar eventos de lifestyle em SP para lançar minha nova linha de produtos..."
        oninput="camValidatePrompt()"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey&&!event.metaKey){event.preventDefault();camIniciar()}"></textarea>
      <div class="cam-prompt-footer">
        <button class="cam-manual-link" id="cam-manual-btn" onclick="pularCampanha()">Criar manualmente no dashboard →</button>
        <button class="cam-prompt-btn" id="cam-prompt-btn" disabled onclick="camIniciar()">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          <span id="cam-prompt-btn-label">Criar com IA →</span>
        </button>
      </div>
    </div>

    <!-- Step 2 + 3: chat + resultado -->
    <div class="cam-chat-body" id="cam-chat-step" style="display:none">
      <div class="cam-thread" id="cam-thread"></div>
      <div class="cam-error" id="cam-error"></div>
      <div class="cam-input-row" id="cam-input-row">
        <textarea class="cam-input" id="cam-input" placeholder="Responda ao agente..." rows="1"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();camEnviar()}"></textarea>
        <button class="cam-btn-send" id="cam-btn-send" onclick="camEnviar()">Enviar</button>
      </div>
      <!-- Step 3: resultado -->
      <div class="cam-result" id="cam-result-step" style="display:none">
        <div class="cam-result-card" id="cam-result-card"></div>
        <div class="cam-result-actions">
          <button class="cam-btn-refazer" onclick="camRefazer()">Ajustar</button>
          <button class="cam-btn-confirmar" id="cam-btn-confirmar" onclick="camConfirmar()">✦ Criar campanha →</button>
        </div>
      </div>
    </div>

  </div><!-- /cam-page -->
</div><!-- /main -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core.js"></script>
<script>
// ── Constantes ──────────────────────────────────────────────────────────────
const CAM_API_BASE = window.location.protocol === 'file:' ? 'https://radar-relevantia.com.br' : '';
const CAM_STATE_KEY = 'rr_onboarding_campanha_state';

// ── Estado ──────────────────────────────────────────────────────────────────
let _st = { loading: false, history: [], lastResult: null, token: null, marcaId: null };

// ── Persistência de estado ───────────────────────────────────────────────────
function _saveState(step) {
  try {
    const selectedBus = [...document.querySelectorAll('#cam-bus-chips .cam-bu-chip.selected')].map(b => b.dataset.negocio);
    const state = {
      step,
      history: _st.history,
      lastResult: _st.lastResult,
      promptText: document.getElementById('cam-prompt-input')?.value || '',
      selectedBus
    };
    localStorage.setItem(CAM_STATE_KEY, JSON.stringify(state));
  } catch(e) {}
}

function _clearState() {
  localStorage.removeItem(CAM_STATE_KEY);
}

function _restoreState() {
  try {
    const raw = localStorage.getItem(CAM_STATE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (!state.step) return false;

    if (state.step === 'prompt') {
      // Restaura texto digitado e BUs selecionados
      const input = document.getElementById('cam-prompt-input');
      if (input && state.promptText) input.value = state.promptText;
      camValidatePrompt();
      if (state.selectedBus?.length) {
        state.selectedBus.forEach(nome => {
          const btn = document.querySelector(`#cam-bus-chips [data-negocio="${CSS.escape(nome)}"]`);
          if (btn) btn.classList.add('selected');
        });
      }
      return true;
    }

    if (state.step === 'chat' || state.step === 'result') {
      // Restaura o chat
      _st.history = state.history || [];
      _st.lastResult = state.lastResult || null;

      document.getElementById('cam-prompt-step').style.display = 'none';
      document.getElementById('cam-chat-step').style.display = 'flex';
      _setStepDots('chat');

      // Rebuild thread from history
      const thread = document.getElementById('cam-thread');
      thread.innerHTML = '';
      _st.history.forEach((msg, i) => {
        if (i === 0) return; // skip first system msg
        _addMsg(msg.role === 'user' ? 'user' : 'agent', _html(msg.content));
      });

      if (state.step === 'result' && state.lastResult) {
        document.getElementById('cam-input-row').style.display = 'none';
        _mostrarResult(state.lastResult, true);
        _setStepDots('result');
      }
      return true;
    }
  } catch(e) {}
  return false;
}

// ── Helpers de UI ────────────────────────────────────────────────────────────
function _esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function _html(t) { return _esc(t).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); }
function _showErr(m) { const e = document.getElementById('cam-error'); if(e){e.textContent=m; e.classList.toggle('visible',!!m);} }
function _setLoading(on) {
  _st.loading = on;
  const s = document.getElementById('cam-btn-send'), i = document.getElementById('cam-input');
  if(s) s.disabled = on; if(i) i.disabled = on;
}
function _addMsg(role, html, isTyping=false) {
  const t = document.getElementById('cam-thread');
  const d = document.createElement('div'); d.className = `cam-msg ${role}`;
  d.innerHTML = `<div class="cam-msg-avatar">${role==='agent'?'✦':'👤'}</div><div class="cam-msg-bubble">${isTyping?'<div class="cam-typing-dots"><span></span><span></span><span></span></div>':html}</div>`;
  if(isTyping) d.id = 'cam-typing-msg';
  t.appendChild(d); t.scrollTop = t.scrollHeight; return d;
}
function _removeTyping() { const e = document.getElementById('cam-typing-msg'); if(e) e.remove(); }
function _phaseUpdate(phases, idx) {
  const el = document.getElementById('cam-typing-msg'); if(!el) return;
  el.querySelector('.cam-msg-bubble').innerHTML = `<span class="cam-loading-phase">${phases[Math.min(idx,phases.length-1)]}<span class="cam-loading-dots"></span></span>`;
}
function _setStepDots(step) {
  const d1 = document.getElementById('step-dot-1');
  const d2 = document.getElementById('step-dot-2');
  const d3 = document.getElementById('step-dot-3');
  if(step === 'prompt') {
    d1.className = 'cam-step-dot active'; d2.className = 'cam-step-dot'; d3.className = 'cam-step-dot';
  } else if(step === 'chat') {
    d1.className = 'cam-step-dot done'; d2.className = 'cam-step-dot active'; d3.className = 'cam-step-dot';
  } else if(step === 'result') {
    d1.className = 'cam-step-dot done'; d2.className = 'cam-step-dot done'; d3.className = 'cam-step-dot active';
  }
}

// ── API ──────────────────────────────────────────────────────────────────────
async function _callAPI(messages, brandProfile, token) {
  const ctrl = new AbortController(); const timer = setTimeout(() => ctrl.abort(), 150000);
  try {
    const r = await fetch(CAM_API_BASE + '/api/gemini-campaign-agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ messages, brandProfile }),
      signal: ctrl.signal
    });
    clearTimeout(timer);
    const data = await r.json().catch(() => ({}));
    if(!r.ok) throw new Error(data.error || `Erro HTTP ${r.status}`);
    if(!data.text) throw new Error('Resposta vazia.');
    return data.text;
  } catch(err) { clearTimeout(timer); if(err.name==='AbortError') throw new Error('IA demorou. Tente novamente.'); throw err; }
}

function _parse(raw) {
  try { return JSON.parse(raw.trim().replace(/^```json\s*/i,'').replace(/```\s*$/,'')); }
  catch(e) { return null; }
}

function _getChips(filtro) {
  const chips = [];
  if(!filtro) return chips;
  const TIPO = { personalidade:'Personalidade', evento:'Evento', artista:'Artista Musical', midia:'Mídia' };
  if(filtro.tipo && filtro.tipo !== 'todos') chips.push(TIPO[filtro.tipo] || filtro.tipo);
  const s = filtro.sel || {};
  if(s.segmento) s.segmento.forEach(x => chips.push(x));
  if(s.alcance) s.alcance.forEach(x => chips.push(x));
  const IL = ['Até R$ 10k','R$ 10k–50k','R$ 50k–200k','R$ 200k+'];
  if(s.invest) s.invest.forEach(i => { if(IL[+i]) chips.push(IL[+i]); });
  if((filtro.toggles||{}).incentivo) chips.push('Lei de Incentivo');
  if((filtro.toggles||{}).cotas) chips.push('Com cotas');
  return chips;
}

function _mostrarResult(campanha, silent=false) {
  if(!campanha) return;
  const chips = _getChips(campanha.filtro);
  let html = `<div class="cam-result-nome">${_esc(campanha.nome||'Nova Campanha')}</div>`;
  if(campanha.negocios?.length) {
    html += `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">`;
    campanha.negocios.forEach(n => { html += `<span class="cam-result-chip" style="background:rgba(30,22,0,.06);border-color:rgba(30,22,0,.15);color:var(--gray-4)">${_esc(n)}</span>`; });
    html += `</div>`;
  }
  if(campanha.contexto) html += `<div style="font-size:12px;color:var(--gray-4);margin-bottom:6px;line-height:1.5"><strong style="color:var(--black)">Contexto:</strong> ${_esc(campanha.contexto)}</div>`;
  if(campanha.definicao_publico) html += `<div style="font-size:12px;color:var(--gray-4);margin-bottom:8px;line-height:1.5"><strong style="color:var(--black)">Público:</strong> ${_esc(campanha.definicao_publico)}</div>`;
  if(chips.length) html += `<div class="cam-result-chips">${chips.map(c => `<span class="cam-result-chip">${_esc(c)}</span>`).join('')}</div>`;
  document.getElementById('cam-result-card').innerHTML = html;
  document.getElementById('cam-result-step').style.display = 'block';
  document.getElementById('cam-input-row').style.display = 'none';
  _st.lastResult = campanha;
  if(!silent) _setStepDots('result');
  if(!silent) _saveState('result');
}

function _renderMsg(parsed) {
  if(!parsed) { _addMsg('agent','<span style="color:#DC2626">❌ Erro. Tente novamente.</span>'); return; }
  let html = '';
  if(parsed.resumo) html += `${_html(parsed.resumo)}<br><br>`;
  if(parsed.concluido) {
    html += `<span style="font-size:13px;color:#7A5C1E;font-weight:600">✦ Campanha configurada!</span><br><span style="font-size:12px;color:#A89880">Revise abaixo e confirme para criar.</span>`;
    _addMsg('agent', html);
    setTimeout(() => _mostrarResult(parsed.campanha), 300);
    return;
  }
  if(parsed.pergunta) html += _html(parsed.pergunta);
  if(parsed.opcoes?.length) {
    const mid = 'cam_opts_' + Date.now();
    const isMulti = !!parsed.multiselect;
    let oHtml = `<div class="cam-options" id="${mid}">`;
    parsed.opcoes.forEach((o,i) => {
      if(isMulti) {
        oHtml += `<button type="button" class="cam-option-btn" data-opc="${_esc(o)}" data-group="${mid}" onclick="window._camToggleOpc(this)"><span class="cam-option-num">${i+1}</span><span>${_esc(o)}</span></button>`;
      } else {
        oHtml += `<button type="button" class="cam-option-btn" data-opc="${_esc(o)}" onclick="window._camSelOpc(this.dataset.opc)"><span class="cam-option-num">${i+1}</span><span>${_esc(o)}</span></button>`;
      }
    });
    if(isMulti) oHtml += `<button type="button" id="cam_confirm_${mid}" onclick="window._camEnviarMulti('${mid}')" style="display:none;margin-top:4px;padding:10px 18px;background:#1A1200;color:#fff;border:none;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;width:100%">Confirmar seleção →</button>`;
    oHtml += `<button type="button" class="cam-option-btn" style="color:var(--gray-3)" onclick="document.getElementById('cam-input').focus()"><span class="cam-option-num" style="background:var(--gray-2);color:var(--gray-4)">${parsed.opcoes.length+1}</span><span>Descreva melhor</span></button>`;
    oHtml += '</div>';
    html += oHtml;
  }
  _addMsg('agent', html);
  _saveState('chat');
}

// ── Chips de BU ──────────────────────────────────────────────────────────────
function _buildBusChips() {
  const brief = window._dashBrandProfile?.brand_brief;
  const negocios = brief?.negocios?.valor ?? brief?.negocios ?? [];
  const section = document.getElementById('cam-bus-section');
  const chips = document.getElementById('cam-bus-chips');
  if(!section || !chips) return;
  chips.innerHTML = '';
  const makeChip = (nome) => {
    const btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'cam-bu-chip';
    btn.textContent = nome; btn.dataset.negocio = nome;
    btn.onclick = () => btn.classList.toggle('selected');
    chips.appendChild(btn);
  };
  (Array.isArray(negocios) ? negocios : []).forEach(n => {
    const nome = typeof n === 'string' ? n : (n.nome || ''); if(nome) makeChip(nome);
  });
  ['Campanha institucional','Outro projeto'].forEach(makeChip);
  section.style.display = 'block';
}

// ── Funções públicas do agente ───────────────────────────────────────────────
window.camValidatePrompt = function() {
  const v = (document.getElementById('cam-prompt-input')?.value || '').trim();
  const btn = document.getElementById('cam-prompt-btn');
  if(btn) btn.disabled = !v;
  _saveState('prompt');
};

window.camRefazer = function() {
  document.getElementById('cam-result-step').style.display = 'none';
  document.getElementById('cam-input-row').style.display = 'flex';
  _st.lastResult = null;
  _setStepDots('chat');
  _saveState('chat');
  setTimeout(() => document.getElementById('cam-input')?.focus(), 80);
};

window.camIniciar = async function() {
  const desc = (document.getElementById('cam-prompt-input')?.value || '').trim();
  if(!desc) return;
  const session = typeof getSessionAsync === 'function' ? await getSessionAsync('brand') : null;
  const token = session?.access_token || _st.token;
  if(!token) { alert('Sessão expirada. Faça login novamente.'); return; }
  const brandProfile = window._dashBrandProfile || null;
  const selectedBus = [...document.querySelectorAll('#cam-bus-chips .cam-bu-chip.selected')].map(b => b.dataset.negocio).filter(Boolean);
  let firstMsg = '';
  if(selectedBus.length) firstMsg += `[NEGÓCIOS SELECIONADOS]\n${selectedBus.join(', ')}\n\n`;
  firstMsg += `[PEDIDO DO USUÁRIO]\n${desc}`;
  const userLabel = selectedBus.length ? `[${selectedBus.join(', ')}] ${desc}` : desc;

  document.getElementById('cam-prompt-step').style.display = 'none';
  document.getElementById('cam-chat-step').style.display = 'flex';
  _setStepDots('chat');
  _addMsg('user', _html(userLabel));
  _setLoading(true); _addMsg('agent','',true);

  const phases = ['🧠 Analisando o perfil da marca','✦ Configurando filtros','✍️ Criando proposta de campanha'];
  let pi = 0; const pt = setInterval(() => _phaseUpdate(phases, ++pi), 3000);
  try {
    _st.history = [{role:'user', content:firstMsg}];
    const raw = await _callAPI(_st.history, brandProfile, token);
    clearInterval(pt); _removeTyping();
    _st.history.push({role:'assistant', content:raw});
    _renderMsg(_parse(raw));
  } catch(err) {
    clearInterval(pt); _removeTyping();
    _showErr(err.message || 'Erro ao processar.');
  } finally { _setLoading(false); }
};

window.camEnviar = async function() {
  if(_st.loading) return;
  const input = document.getElementById('cam-input');
  const text = (input?.value || '').trim(); if(!text) return;
  _showErr(''); input.value = ''; input.style.height = 'auto';
  _addMsg('user', _html(text)); _st.history.push({role:'user', content:text});
  _setLoading(true); _addMsg('agent','',true);
  const phases = ['🧠 Processando','✦ Ajustando filtros'];
  let pi = 0; const pt = setInterval(() => _phaseUpdate(phases, ++pi), 3000);
  const session = typeof getSessionAsync === 'function' ? await getSessionAsync('brand') : null;
  const token = session?.access_token || _st.token;
  try {
    if(!token) throw new Error('Sessão expirada.');
    const raw = await _callAPI(_st.history, window._dashBrandProfile || null, token);
    clearInterval(pt); _removeTyping();
    _st.history.push({role:'assistant', content:raw});
    _renderMsg(_parse(raw));
  } catch(err) {
    clearInterval(pt); _removeTyping();
    _showErr(err.message || 'Erro.');
  } finally { _setLoading(false); const t = document.getElementById('cam-thread'); if(t) t.scrollTop = 999999; }
};

window._camSelOpc = function(text) { if(_st.loading) return; const i = document.getElementById('cam-input'); if(i){i.value=text; window.camEnviar();} };
window._camToggleOpc = function(btn) {
  if(_st.loading) return;
  const sel = btn.getAttribute('data-selected') === 'true';
  btn.setAttribute('data-selected', sel ? 'false' : 'true');
  btn.style.borderColor = sel ? '' : '#B8860B';
  btn.style.background = sel ? '' : 'rgba(184,134,11,0.08)';
  btn.style.color = sel ? '' : '#7A5C1E';
  const gid = btn.getAttribute('data-group');
  const container = document.getElementById(gid); if(!container) return;
  const any = container.querySelectorAll('[data-selected="true"]').length > 0;
  const cb = document.getElementById('cam_confirm_' + gid);
  if(cb) cb.style.display = any ? 'block' : 'none';
};
window._camEnviarMulti = function(gid) {
  if(_st.loading) return;
  const container = document.getElementById(gid); if(!container) return;
  const sel = [...container.querySelectorAll('[data-selected="true"]')].map(b => b.dataset.opc).filter(Boolean);
  if(!sel.length) return;
  const i = document.getElementById('cam-input'); if(i){i.value = sel.join(', '); window.camEnviar();}
};

window.camConfirmar = async function() {
  const campanha = _st.lastResult; if(!campanha) return;
  const btn = document.getElementById('cam-btn-confirmar');
  if(btn) { btn.disabled = true; btn.textContent = 'Criando…'; }

  const session = typeof getSessionAsync === 'function' ? await getSessionAsync('brand') : null;
  const marcaId = session?.user?.id || _st.marcaId;
  const token = session?.access_token || _st.token;
  if(!marcaId || !token) { if(btn){btn.disabled=false; btn.textContent='✦ Criar campanha →';} return; }

  const payload = {
    marca_id: marcaId,
    nome: campanha.nome || 'Nova Campanha',
    descricao: campanha.descricao_objetivo || null,
    contexto: campanha.contexto || null,
    definicao_publico: campanha.definicao_publico || null,
    negocios: campanha.negocios?.length ? campanha.negocios : []
  };
  if(campanha.filtro) payload.filtros = campanha.filtro;

  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/campanhas', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    if(btn) { btn.textContent = '✓ Campanha criada!'; btn.classList.add('saved'); }
    _clearState();
    await concluirOnboarding();
    setTimeout(() => { window.location.href = '/dashboard-marca.html'; }, 700);
  } catch(e) {
    console.error('[camConfirmar]', e);
    _showErr('Erro ao salvar a campanha. Tente novamente.');
    if(btn) { btn.disabled = false; btn.textContent = '✦ Criar campanha →'; }
  }
};

// ── Onboarding helpers ───────────────────────────────────────────────────────
async function concluirOnboarding() {
  try {
    const token = _st.token || (await getSessionAsync('brand'))?.access_token;
    if(!token) return;
    await fetch(SUPABASE_URL + '/auth/v1/user', {
      method: 'PUT',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: { onboarding_completo: true } })
    });
  } catch(e) { console.warn('[concluirOnboarding] não crítico:', e); }
}

async function pularCampanha() {
  _clearState();
  await concluirOnboarding();
  window.location.href = '/dashboard-marca.html';
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  try {
    // Auth guard
    const session = await getSessionAsync('brand');
    if(!session?.access_token) { window.location.href = '/acesso-marca.html'; return; }
    _st.token = session.access_token;
    _st.marcaId = session.user?.id;

    // Garante onboarding_completo=false enquanto está nesta etapa
    const meta = session.user?.user_metadata || {};
    if(meta.onboarding_completo !== false) {
      fetch(SUPABASE_URL + '/auth/v1/user', {
        method: 'PUT',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + _st.token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: { onboarding_completo: false } })
      }).catch(() => {});
    }

    // Carrega brand_brief do perfil → popula window._dashBrandProfile
    const res = await fetch(SUPABASE_URL + '/rest/v1/perfis?id=eq.' + _st.marcaId + '&select=empresa,brand_brief&limit=1', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + _st.token }
    });
    const data = await res.json().catch(() => []);
    const perfil = data?.[0];

    // Se não tem brand_brief → volta para o agente de marca
    if(!perfil?.brand_brief) { window.location.href = '/onboarding-marca.html'; return; }

    // Seta o profile global (mesmo padrão que o dashboard usa)
    window._dashBrandProfile = perfil;

    // Esconde loading, mostra cam
    document.getElementById('loading-section').style.display = 'none';
    document.getElementById('cam-page').style.display = 'block';

    // Monta chips de BU
    _buildBusChips();

    // Tenta restaurar estado salvo (usuário voltou do meio do fluxo)
    const restored = _restoreState();
    if(!restored) {
      // Primeira vez: mostra step 1
      document.getElementById('cam-prompt-step').style.display = 'flex';
      document.getElementById('cam-chat-step').style.display = 'none';
      _setStepDots('prompt');
      setTimeout(() => document.getElementById('cam-prompt-input')?.focus(), 150);
    }

  } catch(e) {
    console.error('[criar-campanha init]', e);
    window.location.href = '/acesso-marca.html';
  }
})();
</script>
