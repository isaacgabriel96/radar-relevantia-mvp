<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>
    (function() {
      try {
        const raw = localStorage.getItem('ri_client_session');
        if (!raw) { window.location.href = 'index.html'; return; }
        const s = JSON.parse(raw);
        if (s.expires_at && Date.now() / 1000 > s.expires_at) {
          localStorage.removeItem('ri_client_session');
          window.location.href = 'index.html';
        }
      } catch { window.location.href = 'index.html'; }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entregáveis — Relevantia Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0E0E0E; --black-2: #1A1A1A; --white: #FFFFFF;
      --gray-1: #F7F7F7; --gray-2: #EBEBEB; --gray-3: #DDDDDD; --gray-5: #717171;
      --gold: #C9A43A; --gold-light: #E8C96A; --gold-pale: #FBF5E6;
      --text: #1A1A1A; --sidebar-w: 240px;
      --gold-gradient: linear-gradient(135deg, #C9A43A 0%, #E8C96A 100%);
      --shadow-gold: 0 8px 32px rgba(201,164,58,0.2);
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--gray-1); color: var(--text); }
    .app { display: flex; min-height: 100vh; }

    /* ── Sidebar (shared) ───────────────────────── */
    .sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--black); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
    .sidebar-header { padding: 28px 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-mark { width: 30px; height: 30px; background: var(--gold-gradient); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(201,164,58,0.3); }
    .logo-mark svg { width: 16px; height: 16px; }
    .logo-text { display: flex; flex-direction: column; line-height: 1; }
    .logo-name { font-size: 13px; font-weight: 600; color: var(--white); }
    .logo-sub { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 2px; letter-spacing: 0.06em; text-transform: uppercase; }
    .sidebar-nav { flex: 1; padding: 20px 12px; overflow-y: auto; }
    .nav-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.2); padding: 0 12px; margin-bottom: 8px; margin-top: 16px; }
    .nav-section-label:first-child { margin-top: 0; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.45); transition: color 0.15s, background 0.15s; position: relative; margin-bottom: 2px; }
    .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.05); }
    .nav-item.active { color: var(--white); background: rgba(201,164,58,0.1); font-weight: 500; }
    .nav-item.active::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 20px; background: var(--gold-gradient); border-radius: 0 3px 3px 0; }
    .nav-icon { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.5; }
    .nav-item.active .nav-icon { opacity: 1; }
    .nav-item:hover .nav-icon { opacity: 0.8; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    .user-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; margin-bottom: 4px; }
    .user-avatar { width: 32px; height: 32px; background: rgba(201,164,58,0.15); border: 1px solid rgba(201,164,58,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--gold); flex-shrink: 0; }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 500; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 1px; }
    .btn-logout { width: 100%; height: 36px; background: transparent; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.35); cursor: pointer; transition: all 0.15s; margin-top: 8px; }
    .btn-logout:hover { border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.65); }

    /* ── Main ────────────────────────────────────── */
    .main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; }

    .main-header { background: var(--white); border-bottom: 1px solid var(--gray-2); padding: 0 40px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .page-breadcrumb { font-size: 13px; color: var(--gray-5); }
    .page-breadcrumb strong { color: var(--text); font-weight: 500; }
    .header-badge { display: flex; align-items: center; gap: 6px; padding: 6px 14px; background: rgba(201,164,58,0.07); border: 1px solid rgba(201,164,58,0.18); border-radius: 20px; font-size: 12px; font-weight: 500; color: var(--gold); }
    .header-badge-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; animation: pulse-dot 2.5s ease infinite; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .content { padding: 40px; }

    /* ── Page Header ─────────────────────────────── */
    .page-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px;
      gap: 16px;
    }

    .page-heading {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--black);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .page-sub { font-size: 14px; color: var(--gray-5); font-weight: 300; }

    /* ── Filter Bar ──────────────────────────────── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gray-5);
      margin-right: 4px;
    }

    .filter-pill {
      height: 34px;
      padding: 0 16px;
      border: 1px solid var(--gray-2);
      border-radius: 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-5);
      background: var(--white);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-pill:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .filter-pill.active {
      background: var(--black);
      border-color: var(--black);
      color: var(--white);
    }

    .filter-pill.active.gold {
      background: var(--gold-gradient);
      border-color: transparent;
      color: var(--white);
      box-shadow: 0 2px 8px rgba(201,164,58,0.3);
    }

    /* ── Cards Grid ──────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .ent-card {
      background: var(--white);
      border: 1px solid var(--gray-2);
      border-radius: 14px;
      padding: 24px;
      transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
      cursor: default;
    }

    .ent-card:hover {
      box-shadow: var(--shadow-gold);
      border-color: rgba(201,164,58,0.2);
      transform: translateY(-2px);
    }

    .ent-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .ent-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--black);
      line-height: 1.4;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ent-desc {
      font-size: 13px;
      color: var(--gray-5);
      line-height: 1.6;
      margin-bottom: 20px;
      font-weight: 300;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Barra de progresso */
    .progress-wrap {
      margin-bottom: 16px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .progress-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--gray-5);
    }

    .progress-pct {
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
    }

    .progress-bar-track {
      height: 4px;
      background: var(--gray-2);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--gold-gradient);
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .ent-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid var(--gray-2);
    }

    .ent-date {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--gray-5);
    }

    .ent-date svg { opacity: 0.5; }

    /* ── Empty State ─────────────────────────────── */
    .empty-state-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      grid-column: 1 / -1;
    }

    .empty-icon {
      width: 56px;
      height: 56px;
      background: var(--gray-2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      color: var(--gray-5);
    }

    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--black);
      margin-bottom: 8px;
    }

    .empty-sub {
      font-size: 14px;
      color: var(--gray-5);
      max-width: 320px;
      line-height: 1.6;
      font-weight: 300;
    }

    /* ── Stats row ───────────────────────────────── */
    .stats-row {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--white);
      border: 1px solid var(--gray-2);
      border-radius: 10px;
    }

    .stat-pill-num {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--black);
      line-height: 1;
    }

    .stat-pill-label {
      font-size: 12px;
      color: var(--gray-5);
      font-weight: 400;
      line-height: 1.3;
    }

    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton { background: linear-gradient(90deg, var(--gray-1) 25%, var(--gray-2) 50%, var(--gray-1) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }

    @media (max-width: 900px) {
      .content { padding: 24px; }
      .page-title-row { flex-direction: column; }
      .stats-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="dashboard.html" class="sidebar-logo">
        <div class="logo-mark">
          <svg viewBox="0 0 20 20" fill="none"><path d="M10 2L17 6V14L10 18L3 14V6L10 2Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 7V13M7 8.5L10 7L13 8.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">Relevantia</span>
          <span class="logo-sub">Intelligence</span>
        </div>
      </a>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Menu</div>
      <a href="dashboard.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="10" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="10" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
        Dashboard
      </a>
      <a href="entregaveis.html" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none"><path d="M3 5h12M3 9h8M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Entregáveis
      </a>
      <a href="relatorios.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none"><path d="M11 2H5a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V6l-3-4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M11 2v4h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 10h6M6 13h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Relatórios
      </a>
      <a href="agenda.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 2v4M12 2v4M2 8h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Agenda
      </a>
      <a href="conteudos.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none"><path d="M2 4a2 2 0 012-2h4l2 2h4a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        Conteúdos
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="userAvatar">—</div>
        <div class="user-info">
          <div class="user-name" id="userName">Carregando…</div>
          <div class="user-role">The Edge</div>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn">Sair da conta</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="main-header">
      <div class="page-breadcrumb">
        <strong>Entregáveis</strong> <span style="color:var(--gray-3);">—</span> Todos os itens
      </div>
      <div class="header-badge">
        <div class="header-badge-dot"></div>
        The Edge — Ativo
      </div>
    </header>

    <div class="content">
      <div class="page-title-row">
        <div>
          <h1 class="page-heading">Entregáveis</h1>
          <p class="page-sub">Acompanhe o andamento de cada item do seu projeto.</p>
        </div>
      </div>

      <!-- Stats row -->
      <div class="stats-row" id="statsRow">
        <div class="stat-pill">
          <div class="stat-pill-num" id="countTotal">—</div>
          <div class="stat-pill-label">Total</div>
        </div>
        <div class="stat-pill">
          <div class="stat-pill-num" id="countConcluido" style="color:var(--gold)">—</div>
          <div class="stat-pill-label">Concluídos</div>
        </div>
        <div class="stat-pill">
          <div class="stat-pill-num" id="countAndamento">—</div>
          <div class="stat-pill-label">Em andamento</div>
        </div>
        <div class="stat-pill">
          <div class="stat-pill-num" id="countPendente">—</div>
          <div class="stat-pill-label">Pendentes</div>
        </div>
      </div>

      <!-- Filter bar -->
      <div class="filter-bar">
        <span class="filter-label">Filtrar:</span>
        <button class="filter-pill active" data-filter="todos">Todos</button>
        <button class="filter-pill" data-filter="pendente">Pendente</button>
        <button class="filter-pill" data-filter="em_andamento">Em andamento</button>
        <button class="filter-pill" data-filter="concluido">Concluído</button>
        <button class="filter-pill" data-filter="pausado">Pausado</button>
      </div>

      <!-- Cards -->
      <div class="cards-grid" id="cardsGrid">
        <div class="ent-card skeleton" style="height:180px;"></div>
        <div class="ent-card skeleton" style="height:180px;"></div>
        <div class="ent-card skeleton" style="height:180px;"></div>
      </div>
    </div>
  </main>
</div>

<script src="js/core.js"></script>
<script>
  const session  = requireAuth('client', 'index.html');
  const token    = session.access_token;
  let allEntries = [];
  let activeFilter = 'todos';

  // Sidebar user
  (async () => {
    const email = session.user?.email || '';
    const res = await sbFetch(`/rest/v1/edge_clients?select=nome,empresa&email=eq.${encodeURIComponent(email)}&limit=1`, token);
    if (res.ok) {
      const data = await res.json();
      if (data.length) {
        document.getElementById('userName').textContent = data[0].empresa || data[0].nome;
        document.getElementById('userAvatar').textContent = (data[0].empresa || data[0].nome || '?')[0].toUpperCase();
      } else {
        document.getElementById('userName').textContent = email;
        document.getElementById('userAvatar').textContent = email[0]?.toUpperCase() || '?';
      }
    }
  })();

  function statusPct(status) {
    return { concluido: 100, em_andamento: 55, pendente: 10, pausado: 30, encerrado: 100 }[status] || 0;
  }

  function renderCards(list) {
    const grid = document.getElementById('cardsGrid');
    if (!list.length) {
      grid.innerHTML = `
        <div class="empty-state-wrap">
          <div class="empty-icon">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
              <path d="M4 7h18M4 12h12M4 17h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="empty-title">Nenhum entregável encontrado</div>
          <p class="empty-sub">Não há itens para o filtro selecionado. Tente outro status.</p>
        </div>`;
      return;
    }

    grid.innerHTML = list.map(e => {
      const sc  = statusColor(e.status);
      const pct = statusPct(e.status);
      const desc = e.descricao || '';
      return `
        <div class="ent-card" data-id="${e.id}">
          <div class="ent-card-top">
            <div class="ent-title">${e.titulo}</div>
            <span class="badge" style="background:${sc.bg};color:${sc.color};">${statusLabel(e.status)}</span>
          </div>
          ${desc ? `<div class="ent-desc">${desc}</div>` : ''}
          <div class="progress-wrap">
            <div class="progress-meta">
              <span class="progress-label">Progresso</span>
              <span class="progress-pct">${pct}%</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="ent-footer">
            <div class="ent-date">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <rect x="1" y="2.5" width="11" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
                <path d="M4 1v3M9 1v3M1 5.5h11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
              ${formatDate(e.prazo) || 'Sem prazo'}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // Filter logic
  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active', 'gold'));
      btn.classList.add('active');
      if (btn.dataset.filter !== 'todos') btn.classList.add('gold');
      activeFilter = btn.dataset.filter;

      const filtered = activeFilter === 'todos'
        ? allEntries
        : allEntries.filter(e => e.status === activeFilter);
      renderCards(filtered);
    });
  });

  // Load data
  (async () => {
    const email = session.user?.email || '';
    const cr = await sbFetch(`/rest/v1/edge_clients?select=id&email=eq.${encodeURIComponent(email)}&limit=1`, token);
    if (!cr.ok) return;
    const clients = await cr.json();
    if (!clients.length) return;
    const clientId = clients[0].id;

    const er = await sbFetch(`/rest/v1/edge_entregaveis?select=id,titulo,descricao,status,prazo,created_at&client_id=eq.${clientId}&order=created_at.desc`, token);
    if (!er.ok) { document.getElementById('cardsGrid').innerHTML = '<div class="ent-card empty-state-wrap"><div class="empty-sub">Erro ao carregar dados.</div></div>'; return; }

    allEntries = await er.json();

    // Stats
    document.getElementById('countTotal').textContent     = allEntries.length;
    document.getElementById('countConcluido').textContent = allEntries.filter(e => e.status === 'concluido').length;
    document.getElementById('countAndamento').textContent = allEntries.filter(e => e.status === 'em_andamento').length;
    document.getElementById('countPendente').textContent  = allEntries.filter(e => e.status === 'pendente').length;

    renderCards(allEntries);
  })();

  document.getElementById('logoutBtn').addEventListener('click', () => {
    clearSession('client'); window.location.href = 'index.html';
  });
</script>
</body>
</html>
