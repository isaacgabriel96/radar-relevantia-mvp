<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>
    (function() {
      try {
        const raw = localStorage.getItem('ri_client_session');
        if (!raw) { window.location.href = 'index.html'; return; }
        const s = JSON.parse(raw);
        if (s.expires_at && Date.now() / 1000 > s.expires_at) {
          localStorage.removeItem('ri_client_session');
          window.location.href = 'index.html';
        }
      } catch { window.location.href = 'index.html'; }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios — Relevantia Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:          #0E0E0E;
      --black-2:        #1A1A1A;
      --white:          #FFFFFF;
      --gray-1:         #F7F7F7;
      --gray-2:         #EBEBEB;
      --gray-3:         #DDDDDD;
      --gray-5:         #717171;
      --gold:           #C9A43A;
      --gold-light:     #E8C96A;
      --gold-pale:      #FBF5E6;
      --gold-dark:      #9A7A24;
      --text:           #1A1A1A;
      --gold-gradient:  linear-gradient(135deg, #C9A43A 0%, #E8C96A 50%, #C9A43A 100%);
      --shadow-gold:    0 8px 32px rgba(201,164,58,0.2);
      --sidebar-w:      240px;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--gray-1); color: var(--text); }
    .app { display: flex; min-height: 100vh; }

    /* ── Sidebar ──────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--black);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }

    .sidebar-header {
      padding: 28px 24px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-mark {
      width: 32px; height: 32px;
      background: var(--gold-gradient);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(201,164,58,0.3);
    }

    .logo-mark svg { width: 17px; height: 17px; }

    .logo-text { display: flex; flex-direction: column; line-height: 1; }
    .logo-name { font-size: 13px; font-weight: 600; color: var(--white); }
    .logo-sub  { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase; }

    .sidebar-nav { flex: 1; padding: 20px 12px; overflow-y: auto; }

    .nav-section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.25); padding: 0 12px; margin-bottom: 8px; margin-top: 16px;
    }
    .nav-section-label:first-child { margin-top: 0; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      text-decoration: none; font-size: 14px; font-weight: 400;
      color: rgba(255,255,255,0.5);
      transition: color 0.15s, background 0.15s;
      position: relative; margin-bottom: 2px;
    }
    .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.05); }
    .nav-item.active { color: var(--white); background: rgba(201,164,58,0.12); font-weight: 500; }
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 20px;
      background: var(--gold-gradient);
      border-radius: 0 3px 3px 0;
    }

    .nav-icon { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.6; }
    .nav-item.active .nav-icon { opacity: 1; }

    .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.06); }

    .user-card {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px; margin-bottom: 4px;
    }

    .user-avatar {
      width: 32px; height: 32px;
      background: rgba(201,164,58,0.15);
      border: 1px solid rgba(201,164,58,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: var(--gold); flex-shrink: 0;
    }

    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 500; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 11px; color: rgba(255,255,255,0.35); }

    .btn-logout {
      width: 100%; height: 36px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      color: rgba(255,255,255,0.4); cursor: pointer;
      transition: all 0.15s; margin-top: 8px;
    }
    .btn-logout:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }

    /* ── Main ─────────────────────────────────────────────── */
    .main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; }

    .main-header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-2);
      padding: 0 40px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }

    .page-breadcrumb { font-size: 13px; color: var(--gray-5); }
    .page-breadcrumb strong { color: var(--text); font-weight: 500; }

    .header-count {
      font-size: 13px;
      color: var(--gray-5);
    }

    .content { padding: 40px; }

    .page-header { margin-bottom: 32px; }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 600;
      color: var(--black); margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .page-desc { font-size: 15px; color: var(--gray-5); font-weight: 300; }

    /* ── Filter Bar ───────────────────────────────────────── */
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px;
    }

    .filter-pill {
      height: 36px; padding: 0 18px;
      border-radius: 20px;
      border: 1px solid var(--gray-2);
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      color: var(--gray-5);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-pill:hover { border-color: var(--gray-3); color: var(--text); }

    .filter-pill.active-all {
      background: var(--black);
      border-color: var(--black);
      color: var(--white);
    }

    .filter-pill.active-gold {
      background: var(--gold-gradient);
      border-color: transparent;
      color: var(--white);
      box-shadow: 0 2px 12px rgba(201,164,58,0.35);
    }

    /* ── Relatórios Grid ──────────────────────────────────── */
    .relatorios-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .relatorio-card {
      background: var(--white);
      border: 1px solid var(--gray-2);
      border-radius: 14px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .relatorio-card:hover {
      border-color: rgba(201,164,58,0.35);
      box-shadow: var(--shadow-gold);
      transform: translateY(-2px);
    }

    .rel-type-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .rel-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      background: var(--gold-pale);
      color: var(--gold-dark);
      border: 1px solid rgba(201,164,58,0.2);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .rel-type-dot {
      width: 5px; height: 5px;
      background: var(--gold);
      border-radius: 50%;
    }

    .rel-arrow {
      color: var(--gray-3);
      font-size: 18px;
      line-height: 1;
      transition: color 0.15s, transform 0.15s;
    }

    .relatorio-card:hover .rel-arrow {
      color: var(--gold);
      transform: translateX(3px);
    }

    .rel-title {
      font-family: 'Playfair Display', serif;
      font-size: 19px;
      font-weight: 600;
      color: var(--black);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .rel-date {
      font-size: 13px;
      color: var(--gray-5);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .rel-date::before {
      content: '';
      display: inline-block;
      width: 12px; height: 1px;
      background: var(--gray-3);
    }

    .rel-excerpt {
      font-size: 14px;
      color: var(--gray-5);
      line-height: 1.7;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .rel-divider {
      width: 100%;
      height: 1px;
      background: var(--gray-2);
      margin: 20px 0;
    }

    .btn-read {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      transition: color 0.15s;
    }

    .btn-read svg { color: var(--gray-3); transition: color 0.15s, transform 0.15s; }

    .relatorio-card:hover .btn-read { color: var(--gold); }
    .relatorio-card:hover .btn-read svg { color: var(--gold); transform: translateX(3px); }

    /* ── Skeleton ─────────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, #F0F0F0 25%, #FAFAFA 50%, #F0F0F0 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 6px;
    }

    .skel-card {
      background: var(--white);
      border: 1px solid var(--gray-2);
      border-radius: 14px;
      padding: 28px;
    }

    .skel-badge { height: 22px; width: 72px; border-radius: 20px; margin-bottom: 16px; }
    .skel-title { height: 20px; width: 75%; margin-bottom: 8px; }
    .skel-title-short { height: 20px; width: 50%; margin-bottom: 14px; }
    .skel-date { height: 13px; width: 100px; margin-bottom: 18px; }
    .skel-line { height: 13px; width: 100%; margin-bottom: 8px; }
    .skel-line-short { height: 13px; width: 65%; }

    /* ── Empty State ──────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      padding: 80px 24px;
      text-align: center;
    }

    .empty-icon {
      width: 64px; height: 64px;
      background: var(--gold-pale);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .empty-icon svg { width: 28px; height: 28px; color: var(--gold); }

    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--black);
      margin-bottom: 8px;
    }

    .empty-sub {
      font-size: 14px;
      color: var(--gray-5);
      font-weight: 300;
    }

    /* ── Modal ────────────────────────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(3px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--white);
      border-radius: 16px;
      width: 100%;
      max-width: 680px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 32px 96px rgba(0,0,0,0.25);
      animation: modal-in 0.2s ease;
    }

    @keyframes modal-in {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to   { opacity: 1; transform: none; }
    }

    .modal-header {
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--gray-2);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .modal-header-left { flex: 1; min-width: 0; }

    .modal-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 11px;
      background: var(--gold-pale);
      color: var(--gold-dark);
      border: 1px solid rgba(201,164,58,0.2);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--black);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .modal-meta { font-size: 13px; color: var(--gray-5); }

    .btn-close {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--gray-2);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      color: var(--gray-5);
      transition: all 0.15s;
    }
    .btn-close:hover { border-color: var(--gray-5); color: var(--text); }

    .modal-body {
      padding: 28px 32px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-content {
      font-size: 15px;
      line-height: 1.85;
      color: var(--text);
      white-space: pre-wrap;
    }
  </style>
</head>

<script>
  const session = requireAuth('client', 'index.html');
  const token   = session.access_token;
  const email   = session.user?.email || '';
  let allData   = [];
  let activeFilter = 'todos';

  const tipoMap = { mensal: 'Mensal', semanal: 'Semanal', especial: 'Especial' };

  async function loadUser() {
    const res = await sbFetch(`/rest/v1/edge_clients?select=nome,empresa&email=eq.${encodeURIComponent(email)}&limit=1`, token);
    if (res.ok) {
      const d = await res.json();
      if (d.length) {
        document.getElementById('userName').textContent   = d[0].empresa || d[0].nome;
        document.getElementById('userAvatar').textContent = (d[0].empresa || d[0].nome || '?')[0].toUpperCase();
      }
    }
  }

  async function loadRelatorios() {
    const clientRes = await sbFetch(`/rest/v1/edge_clients?select=id&email=eq.${encodeURIComponent(email)}&limit=1`, token);
    if (!clientRes.ok) { renderEmpty('Erro ao carregar dados.'); return; }
    const clients = await clientRes.json();
    if (!clients.length) { renderEmpty('Nenhum relatório disponível.'); return; }
    const clientId = clients[0].id;

    const res = await sbFetch(`/rest/v1/edge_relatorios?select=*&client_id=eq.${clientId}&order=data_referencia.desc`, token);
    if (!res.ok) { renderEmpty('Erro ao carregar relatórios.'); return; }
    allData = await res.json();
    renderCards();
  }

  function renderEmpty(msg) {
    document.getElementById('relatoriosGrid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 28 28" fill="none">
            <path d="M17 3H7a2 2 0 00-2 2v18a2 2 0 002 2h14a2 2 0 002-2V9l-6-6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M17 3v6h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 15h10M9 19h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="empty-title">Nenhum relatório aqui</div>
        <div class="empty-sub">${msg}</div>
      </div>`;
  }

  function renderCards() {
    const filtered = activeFilter === 'todos' ? allData : allData.filter(r => r.tipo === activeFilter);
    const count = filtered.length;
    document.getElementById('totalCount').textContent = count > 0 ? `${count} relatório${count !== 1 ? 's' : ''}` : '';

    if (filtered.length === 0) {
      renderEmpty('Nenhum relatório nesta categoria ainda.');
      return;
    }

    document.getElementById('relatoriosGrid').innerHTML = filtered.map(r => `
      <div class="relatorio-card" onclick='openModal(${JSON.stringify(r).replace(/'/g, "&#39;")})'>
        <div class="rel-type-row">
          <span class="rel-type-badge">
            <span class="rel-type-dot"></span>
            ${tipoMap[r.tipo] || r.tipo || 'Relatório'}
          </span>
          <span class="rel-arrow">→</span>
        </div>
        <div class="rel-title">${r.titulo}</div>
        <div class="rel-date">${formatDate(r.data_referencia)}</div>
        <div class="rel-excerpt">${r.conteudo || 'Clique para ver o conteúdo completo.'}</div>
        <div class="rel-divider"></div>
        <div class="btn-read">
          Ler relatório completo
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>`).join('');
  }

  function openModal(r) {
    document.getElementById('modalType').textContent    = tipoMap[r.tipo] || r.tipo || 'Relatório';
    document.getElementById('modalTitle').textContent   = r.titulo;
    document.getElementById('modalMeta').textContent    = formatDate(r.data_referencia);
    document.getElementById('modalContent').textContent = r.conteudo || 'Sem conteúdo disponível.';
    document.getElementById('modal').classList.add('open');
  }

  document.getElementById('modalClose').addEventListener('click', () => {
    document.getElementById('modal').classList.remove('open');
  });

  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal')) {
      document.getElementById('modal').classList.remove('open');
    }
  });

  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(b => {
        b.classList.remove('active-all', 'active-gold');
      });
      activeFilter = btn.dataset.filter;
      btn.classList.add(activeFilter === 'todos' ? 'active-all' : 'active-gold');
      renderCards();
    });
  });

  document.getElementById('logoutBtn').addEventListener('click', () => {
    clearSession('client');
    window.location.href = 'index.html';
  });

  loadUser();
  loadRelatorios();
</script>
</body>
</html>
