<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>
    (function() {
      try {
        const raw = localStorage.getItem('ri_client_session');
        if (!raw) { window.location.href = 'index.html'; return; }
        const s = JSON.parse(raw);
        if (s.expires_at && Date.now() / 1000 > s.expires_at) {
          localStorage.removeItem('ri_client_session');
          window.location.href = 'index.html';
        }
      } catch { window.location.href = 'index.html'; }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conteúdos — Relevantia Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:          #0E0E0E;
      --black-2:        #1A1A1A;
      --white:          #FFFFFF;
      --gray-1:         #F7F7F7;
      --gray-2:         #EBEBEB;
      --gray-3:         #DDDDDD;
      --gray-5:         #717171;
      --gold:           #C9A43A;
      --gold-light:     #E8C96A;
      --gold-pale:      #FBF5E6;
      --gold-dark:      #9A7A24;
      --text:           #1A1A1A;
      --gold-gradient:  linear-gradient(135deg, #C9A43A 0%, #E8C96A 50%, #C9A43A 100%);
      --shadow-gold:    0 8px 32px rgba(201,164,58,0.2);
      --sidebar-w:      240px;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--gray-1); color: var(--text); }
    .app { display: flex; min-height: 100vh; }

    /* ── Sidebar ──────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--black); display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    }

    .sidebar-header { padding: 28px 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }

    .logo-mark {
      width: 32px; height: 32px;
      background: var(--gold-gradient);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(201,164,58,0.3);
    }
    .logo-mark svg { width: 17px; height: 17px; }

    .logo-text { display: flex; flex-direction: column; line-height: 1; }
    .logo-name { font-size: 13px; font-weight: 600; color: var(--white); }
    .logo-sub  { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase; }

    .sidebar-nav { flex: 1; padding: 20px 12px; overflow-y: auto; }
    .nav-section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.25); padding: 0 12px; margin-bottom: 8px; margin-top: 16px;
    }
    .nav-section-label:first-child { margin-top: 0; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      text-decoration: none; font-size: 14px; font-weight: 400;
      color: rgba(255,255,255,0.5);
      transition: color 0.15s, background 0.15s;
      position: relative; margin-bottom: 2px;
    }
    .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.05); }
    .nav-item.active { color: var(--white); background: rgba(201,164,58,0.12); font-weight: 500; }
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 20px;
      background: var(--gold-gradient);
      border-radius: 0 3px 3px 0;
    }

    .nav-icon { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.6; }
    .nav-item.active .nav-icon { opacity: 1; }

    .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    .user-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; margin-bottom: 4px; }

    .user-avatar {
      width: 32px; height: 32px;
      background: rgba(201,164,58,0.15);
      border: 1px solid rgba(201,164,58,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: var(--gold); flex-shrink: 0;
    }

    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 500; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 11px; color: rgba(255,255,255,0.35); }

    .btn-logout {
      width: 100%; height: 36px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      color: rgba(255,255,255,0.4); cursor: pointer;
      transition: all 0.15s; margin-top: 8px;
    }
    .btn-logout:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }

    /* ── Main ─────────────────────────────────────────────── */
    .main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; }

    .main-header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-2);
      padding: 0 40px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }

    .page-breadcrumb { font-size: 13px; color: var(--gray-5); }
    .page-breadcrumb strong { color: var(--text); font-weight: 500; }

    .header-count { font-size: 13px; color: var(--gray-5); }

    .content { padding: 40px; }

    .page-header { margin-bottom: 32px; }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 600; color: var(--black);
      margin-bottom: 6px; letter-spacing: -0.01em;
    }

    .page-desc { font-size: 15px; color: var(--gray-5); font-weight: 300; }

    /* ── Filter Bar ───────────────────────────────────────── */
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px;
    }

    .filter-pill {
      height: 36px; padding: 0 18px;
      border-radius: 20px;
      border: 1px solid var(--gray-2);
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      color: var(--gray-5);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-pill:hover { border-color: var(--gray-3); color: var(--text); }

    .filter-pill.active-all {
      background: var(--black);
      border-color: var(--black);
      color: var(--white);
    }

    .filter-pill.active-gold {
      background: var(--gold-gradient);
      border-color: transparent;
      color: var(--white);
      box-shadow: 0 2px 12px rgba(201,164,58,0.35);
    }

    /* ── Conteúdos Grid ───────────────────────────────────── */
    .conteudos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* Thumbnail area */
    .card-thumb {
      height: 120px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .card-thumb-default {
      background: linear-gradient(135deg, #F0EAD6 0%, #FBF5E6 40%, #EDE5CC 100%);
    }

    .card-thumb-frameworks {
      background: linear-gradient(135deg, #EDE5F5 0%, #F5EFF9 40%, #E8DFF5 100%);
    }

    .card-thumb-playbooks {
      background: linear-gradient(135deg, #E5F0FF 0%, #EFF6FF 40%, #DCE8FF 100%);
    }

    .card-thumb-estudos {
      background: linear-gradient(135deg, #E5F5EE 0%, #ECFDF5 40%, #D8F0E5 100%);
    }

    .card-thumb-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.75;
    }

    .card-thumb-icon svg { width: 22px; height: 22px; }

    .thumb-icon-gold   { background: rgba(201,164,58,0.15);  color: var(--gold); }
    .thumb-icon-purple { background: rgba(139,92,246,0.12);  color: #8B5CF6; }
    .thumb-icon-blue   { background: rgba(59,130,246,0.12);  color: #3B82F6; }
    .thumb-icon-green  { background: rgba(16,185,129,0.12);  color: #10B981; }

    /* Card */
    .conteudo-card {
      background: var(--white);
      border: 1px solid var(--gray-2);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .conteudo-card:hover {
      border-color: rgba(201,164,58,0.3);
      box-shadow: var(--shadow-gold);
      transform: translateY(-2px);
    }

    .card-cat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .card-cat {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold-dark);
      background: var(--gold-pale);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid rgba(201,164,58,0.15);
    }

    .card-cat.cat-frameworks { color: #7C3AED; background: #F5F0FF; border-color: rgba(124,58,237,0.1); }
    .card-cat.cat-playbooks  { color: #1D4ED8; background: #EFF6FF; border-color: rgba(29,78,216,0.1); }
    .card-cat.cat-estudos    { color: #059669; background: #ECFDF5; border-color: rgba(5,150,105,0.1); }

    .card-new-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold-dark);
      background: var(--gold-gradient);
      color: white;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--black);
      margin-bottom: 8px;
      line-height: 1.35;
    }

    .card-desc {
      font-size: 13px;
      color: var(--gray-5);
      line-height: 1.65;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-date {
      font-size: 12px;
      color: var(--gray-5);
    }

    .btn-access {
      height: 36px;
      padding: 0 16px;
      background: var(--gold-gradient);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(201,164,58,0.25);
      transition: box-shadow 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .btn-access:hover { box-shadow: 0 4px 16px rgba(201,164,58,0.4); transform: translateY(-1px); }
    .btn-access:active { transform: none; }

    .btn-access-outline {
      height: 36px;
      padding: 0 16px;
      background: transparent;
      border: 1px solid var(--gray-2);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-5);
      cursor: not-allowed;
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
    }

    /* ── Skeleton ─────────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, #F0F0F0 25%, #FAFAFA 50%, #F0F0F0 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 6px;
    }

    .skel-card {
      background: var(--white);
      border: 1px solid var(--gray-2);
      border-radius: 14px;
      padding: 20px;
    }

    .skel-thumb { height: 120px; border-radius: 10px; margin-bottom: 20px; }
    .skel-badge-sm { height: 22px; width: 80px; border-radius: 20px; margin-bottom: 10px; }
    .skel-title { height: 18px; width: 80%; margin-bottom: 8px; }
    .skel-title-short { height: 18px; width: 55%; margin-bottom: 16px; }
    .skel-line { height: 13px; width: 100%; margin-bottom: 6px; }
    .skel-line-short { height: 13px; width: 60%; margin-bottom: 20px; }
    .skel-footer { display: flex; justify-content: space-between; }
    .skel-date { height: 13px; width: 70px; }
    .skel-btn  { height: 36px; width: 100px; border-radius: 8px; }

    /* ── Empty State ──────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      padding: 80px 24px;
      text-align: center;
    }

    .empty-icon {
      width: 64px; height: 64px;
      background: var(--gold-pale);
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .empty-icon svg { width: 28px; height: 28px; color: var(--gold); }

    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 600;
      color: var(--black); margin-bottom: 8px;
    }

    .empty-sub { font-size: 14px; color: var(--gray-5); font-weight: 300; }
  </style>
</head>

<script>
  const session = requireAuth('client', 'index.html');
  const token   = session.access_token;
  const email   = session.user?.email || '';
  let allData   = [];
  let activeFilter = 'todos';

  // Category config
  const catConfig = {
    frameworks: {
      label: 'Frameworks',
      thumbClass: 'card-thumb-frameworks',
      catClass: 'cat-frameworks',
      iconClass: 'thumb-icon-purple',
      icon: `<svg viewBox="0 0 22 22" fill="none"><rect x="2" y="2" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="13" y="2" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="13" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="13" y="13" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/></svg>`
    },
    playbooks: {
      label: 'Playbooks',
      thumbClass: 'card-thumb-playbooks',
      catClass: 'cat-playbooks',
      iconClass: 'thumb-icon-blue',
      icon: `<svg viewBox="0 0 22 22" fill="none"><path d="M5 3h12a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V4a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/><path d="M8 9h6M8 13h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`

    estudos: {

      catClass: 'cat-estudos',

      icon: `<svg viewBox="0 0 22 22" fill="none"><path d="M11 3L3 8l8 5 8-5-8-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M3 13l8 5 8-5M3 10.5l8 5 8-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
    },
  };

  const defaultConfig = {
    label: 'Conteúdo',
    thumbClass: 'card-thumb-default',
    catClass: '',
    iconClass: 'thumb-icon-gold',
    icon: `<svg viewBox="0 0 22 22" fill="none"><path d="M14 3H6a1 1 0 00-1 1v14a1 1 0 001 1h10a1 1 0 001-1V7l-3-4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M14 3v4h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
  };

  async function loadUser() {
    const res = await sbFetch(`/rest/v1/edge_clients?select=nome,empresa&email=eq.${encodeURIComponent(email)}&limit=1`, token);
    if (res.ok) {
      const d = await res.json();
      if (d.length) {
        document.getElementById('userName').textContent   = d[0].empresa || d[0].nome;
        document.getElementById('userAvatar').textContent = (d[0].empresa || d[0].nome || '?')[0].toUpperCase();
      }
    }
  }

  async function loadConteudos() {
    const res = await sbFetch(`/rest/v1/edge_conteudos?select=*&order=created_at.desc`, token);
    if (!res.ok) {
      renderEmpty('Erro ao carregar conteúdos.');
      return;
    }
    allData = await res.json();
    renderCards();
  }

  function renderEmpty(msg) {
    document.getElementById('conteudosGrid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 28 28" fill="none">
            <path d="M5 4h12l6 6v14a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M17 4v6h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 16h10M9 20h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="empty-title">Nenhum conteúdo aqui</div>
        <div class="empty-sub">${msg}</div>
      </div>`;
  }

  function renderCards() {
    const filtered = activeFilter === 'todos' ? allData : allData.filter(c => c.categoria === activeFilter);
    const count = filtered.length;
    document.getElementById('totalCount').textContent = count > 0 ? `${count} item${count !== 1 ? 's' : ''}` : '';

    if (filtered.length === 0) {
      renderEmpty('Nenhum conteúdo disponível nesta categoria ainda.');
      return;
    }

    document.getElementById('conteudosGrid').innerHTML = filtered.map(c => {
      const cfg    = catConfig[c.categoria] || defaultConfig;
      const hasUrl = c.url_arquivo && c.url_arquivo.trim() !== '';
      const isNew  = c.created_at && (Date.now() - new Date(c.created_at).getTime()) < 7 * 24 * 60 * 60 * 1000;

      return `
        <div class="conteudo-card">
          <div class="card-thumb ${cfg.thumbClass}">
            <div class="card-thumb-icon ${cfg.iconClass}">${cfg.icon}</div>
          </div>
          <div class="card-cat-row">
            <span class="card-cat ${cfg.catClass}">${cfg.label}</span>
            ${isNew ? `<span class="card-new-badge">Novo</span>` : ''}
          </div>
          <div class="card-title">${c.titulo}</div>
          <div class="card-desc">${c.descricao || 'Material estratégico exclusivo para clientes The Edge.'}</div>
          <div class="card-footer">
            <span class="card-date">${formatDate(c.created_at ? c.created_at.split('T')[0] : '')}</span>
            ${hasUrl
              ? `<a href="${c.url_arquivo}" target="_blank" rel="noopener" class="btn-access">
                   Acessar
                   <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                     <path d="M2.5 6h7M6 2.5l3.5 3.5L6 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                   </svg>
                 </a>`
              : `<span class="btn-access-outline">Em breve</span>`
            }
          </div>
        </div>`;
    }).join('');
  }

  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(b => {
        b.classList.remove('active-all', 'active-gold');
      });
      activeFilter = btn.dataset.filter;
      btn.classList.add(activeFilter === 'todos' ? 'active-all' : 'active-gold');
      renderCards();
    });
  });

  document.getElementById('logoutBtn').addEventListener('click', () => {
    clearSession('client');
    window.location.href = 'index.html';
  });

  loadUser();
  loadConteudos();
</script>
</body>
</html>
