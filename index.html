<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar Relevantia — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #B8860B;
      --gold-gradient: linear-gradient(135deg, #B8860B, #C8A84B);
      --black: #1A1200;
      --white-warm: #FFFDF7;
    }

    html, body {
      height: 100%;
      background: var(--black);
      font-family: 'DM Sans', sans-serif;
      color: var(--white-warm);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% -10%, rgba(184,134,11,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 100%, rgba(184,134,11,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 380px;
      margin: 0 20px;
      background: rgba(255,253,247,0.04);
      border: 1px solid rgba(255,253,247,0.10);
      border-radius: 24px;
      padding: 48px 40px 40px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 1px 0 rgba(255,253,247,0.06) inset;
      animation: fadeUp .45s cubic-bezier(.2,.8,.2,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: block;
      height: 28px;
      width: auto;
      margin: 0 auto 36px;
      object-fit: contain;
    }

    .heading {
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      color: var(--white-warm);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .subtext {
      font-size: 13.5px;
      color: rgba(255,253,247,0.50);
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .input-wrap input {
      width: 100%;
      background: rgba(255,253,247,0.06);
      border: 1px solid rgba(255,253,247,0.14);
      border-radius: 12px;
      padding: 14px 46px 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--white-warm);
      outline: none;
      transition: border-color .2s ease, background .2s ease;
      letter-spacing: 0.1em;
    }

    .input-wrap input::placeholder {
      color: rgba(255,253,247,0.30);
      letter-spacing: 0;
    }

    .input-wrap input:focus {
      border-color: rgba(184,134,11,0.55);
      background: rgba(255,253,247,0.08);
    }

    .toggle-vis {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,253,247,0.35);
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color .15s ease;
    }
    .toggle-vis:hover { color: rgba(255,253,247,0.70); }

    .error-msg {
      font-size: 12px;
      color: #e06060;
      text-align: center;
      min-height: 18px;
      margin-bottom: 10px;
      transition: opacity .2s ease;
      opacity: 0;
    }
    .error-msg.show { opacity: 1; }

    .btn-enter {
      width: 100%;
      background: var(--gold-gradient);
      border: none;
      border-radius: 100px;
      padding: 14px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--black);
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: filter .2s ease, transform .15s ease;
    }
    .btn-enter:hover  { filter: brightness(1.08); transform: translateY(-1px); }
    .btn-enter:active { transform: translateY(0); filter: brightness(0.96); }

    .footer-note {
      margin-top: 28px;
      font-size: 11.5px;
      color: rgba(255,253,247,0.22);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="card">
  <img src="logos/5.png" alt="Radar Relevantia" class="logo">

  <h1 class="heading">Acesso à demonstração</h1>
  <p class="subtext">Insira a senha para visualizar o demo interativo do Radar.</p>

  <div class="input-wrap">
    <input type="password" id="pwdInput" placeholder="Senha de acesso" autocomplete="off" autofocus>
    <button class="toggle-vis" id="toggleVis" type="button" aria-label="Mostrar senha">
      <svg id="iconEye" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
      </svg>
      <svg id="iconEyeOff" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" style="display:none">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
      </svg>
    </button>
  </div>

  <p class="error-msg" id="errorMsg">Senha incorreta. Tente novamente.</p>

  <button class="btn-enter" id="btnEnter">Entrar na demo</button>

  <p class="footer-note">Este ambiente é exclusivo para demonstração.<br>Os dados exibidos são fictícios.</p>
</div>

<script>
  var DEMO_PASSWORD = 'radar2026';
  var SESSION_KEY   = 'rr_demo_auth';

  // Já autenticado nessa sessão → vai direto
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    location.replace('demo.html');
  }

  var input     = document.getElementById('pwdInput');
  var btn       = document.getElementById('btnEnter');
  var errorMsg  = document.getElementById('errorMsg');
  var toggleVis = document.getElementById('toggleVis');
  var iconEye    = document.getElementById('iconEye');
  var iconEyeOff = document.getElementById('iconEyeOff');

  function tryEnter() {
    if (input.value === DEMO_PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, '1');
      btn.textContent = 'Entrando…';
      btn.style.opacity = '0.7';
      btn.style.pointerEvents = 'none';
      setTimeout(function() { location.replace('demo.html'); }, 300);
    } else {
      errorMsg.classList.add('show');
      input.style.borderColor = 'rgba(220,80,80,0.55)';
      input.select();
      setTimeout(function() {
        errorMsg.classList.remove('show');
        input.style.borderColor = '';
      }, 2500);
    }
  }

  btn.addEventListener('click', tryEnter);
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') tryEnter(); });

  toggleVis.addEventListener('click', function() {
    var isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    iconEye.style.display    = isText ? '' : 'none';
    iconEyeOff.style.display = isText ? 'none' : '';
  });
</script>
</body>
</html>
